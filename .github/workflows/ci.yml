name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      # Everything runs inside the flake so tool versions match local hooks.
      - name: Rust format
        run: nix develop -c cargo fmt --check
      - name: Rust clippy
        run: nix develop -c cargo clippy --all-targets -- -D warnings
      - name: Rust tests (native)
        run: nix develop -c cargo test

      # WASM build + headless browser tests (CI only — too slow for git hooks).
      # Use the web build:wasm script so the --out-dir (web/src/wasm) stays in one place.
      - name: WASM build
        run: nix develop -c bash -c "cd web && pnpm build:wasm"
      - name: WASM tests
        run: nix develop -c wasm-pack test --headless --chrome crates/gql-core

      - name: Web install
        run: nix develop -c bash -c "cd web && pnpm install --frozen-lockfile"
      - name: Web lint
        run: nix develop -c bash -c "cd web && pnpm lint"
      - name: Web typecheck
        run: nix develop -c bash -c "cd web && pnpm tsc --noEmit"
      - name: Web tests
        run: nix develop -c bash -c "cd web && pnpm test run"
      - name: Web e2e tests
        run: nix develop -c bash -c "cd web && pnpm e2e"
